<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuestoo - Gestión en la Nube</title>
  <!-- Tailwind CSS para un diseño moderno e instantáneo -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Iconos de Lucide para mejorar la interfaz -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans antialiased text-slate-800">

  <!-- ========================================== -->
  <!-- 1. PANTALLA DE INICIO DE SESIÓN (LOGIN)    -->
  <!-- ========================================== -->
  <div id="login-screen" class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-slate-100 text-center mx-4 transition-all duration-300">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-50 text-indigo-600 mb-6">
      <i data-lucide="wallet" class="w-8 h-8"></i>
    </div>
    <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">Presupuestoo</h1>
    <p class="text-slate-500 mb-8 text-sm">Gestiona y guarda tus programas y presupuestos de forma segura en la nube.</p>
    
    <button id="login-btn" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-50 text-slate-700 font-semibold py-3 px-4 border border-slate-300 rounded-xl shadow-sm transition-all duration-200">
      <!-- Icono de Google estilizado con SVG -->
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.47 15 1 12 1 7.35 1 3.39 3.65 1.45 7.5l3.82 2.96C6.18 7.37 8.86 5.04 12 5.04z"/>
        <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.34H12v4.44h6.44c-.28 1.46-1.1 2.7-2.34 3.53l3.64 2.82c2.13-1.96 3.75-4.85 3.75-8.45z"/>
        <path fill="#FBBC05" d="M5.27 14.54a7.17 7.17 0 010-4.08L1.45 7.5a11.95 11.95 0 000 9.01l3.82-2.97z"/>
        <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.64-2.82c-1.1.74-2.52 1.18-4.32 1.18-3.14 0-5.82-2.33-6.77-5.46L1.41 15.9A11.96 11.96 0 0012 23z"/>
      </svg>
      Iniciar sesión con Google
    </button>
  </div>

  <!-- ========================================== -->
  <!-- 2. PANTALLA PRINCIPAL (DASHBOARD)          -->
  <!-- ========================================== -->
  <div id="app-screen" class="hidden w-full max-w-4xl p-6 bg-white rounded-2xl shadow-xl border border-slate-100 mx-4 my-8 transition-all duration-300">
    <!-- Encabezado de la App -->
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center pb-6 border-b border-slate-100 gap-4">
      <div class="flex items-center gap-3">
        <div id="user-avatar" class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden border-2 border-indigo-500">
          <img id="user-photo" src="" alt="Avatar" class="w-full h-full object-cover hidden">
        </div>
        <div>
          <h2 id="user-name" class="font-bold text-slate-900 leading-tight">Usuario</h2>
          <p id="user-email" class="text-xs text-slate-500">correo@dominio.com</p>
        </div>
      </div>
      
      <button id="logout-btn" class="flex items-center gap-2 text-slate-500 hover:text-red-600 font-medium text-sm transition-colors py-2 px-3 rounded-lg hover:bg-red-50">
        <i data-lucide="log-out" class="w-4 h-4"></i>
        Cerrar Sesión
      </button>
    </header>

    <!-- Cuerpo del programa -->
    <main class="mt-6">
      <label for="user-data-input" class="block text-sm font-semibold text-slate-700 mb-2">Editor de Programa / Presupuesto</label>
      <textarea id="user-data-input" class="w-full h-80 p-4 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm shadow-inner bg-slate-50 resize-none outline-none" placeholder="Escribe aquí tu presupuesto, código o datos del programa..."></textarea>
      
      <!-- Panel de Acciones -->
      <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mt-6 pt-6 border-t border-slate-100">
        <span id="sync-status" class="text-xs text-slate-400 flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-slate-300"></span>
          Sin sincronizar
        </span>
        
        <div class="flex gap-3 w-full sm:w-auto">
          <button id="load-btn" class="flex-1 sm:flex-initial flex items-center justify-center gap-2 bg-white hover:bg-slate-50 text-slate-700 font-semibold py-2.5 px-5 border border-slate-300 rounded-xl shadow-sm transition-all duration-150">
            <i data-lucide="cloud-download" class="w-4 h-4"></i>
            Cargar de la Nube
          </button>
          
          <button id="save-btn" class="flex-1 sm:flex-initial flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-xl shadow-sm shadow-indigo-100 transition-all duration-150">
            <i data-lucide="cloud-upload" class="w-4 h-4"></i>
            Guardar en Nube
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- ========================================== -->
  <!-- 3. LÓGICA DE FIREBASE (MÓDULO ES)          -->
  <!-- ========================================== -->
  <script type="module">
    // Importamos las librerías oficiales de Firebase mediante CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithPopup, 
      signOut, 
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
      getFirestore, 
      doc, 
      setDoc, 
      getDoc 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Tu configuración oficial de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyA3LZ1McbsWua3NVXliHIOoJ4C29lmM9oo",
      authDomain: "presupuestoo-5aa23.firebaseapp.com",
      projectId: "presupuestoo-5aa23",
      storageBucket: "presupuestoo-5aa23.firebasestorage.app",
      messagingSenderId: "963779259933",
      appId: "1:963779259933:web:08ca5e849e2605a3d7e0f4",
      measurementId: "G-M4LD85QQ5G"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    const db = getFirestore(app);

    // Capturar elementos de la interfaz
    const loginScreen = document.getElementById("login-screen");
    const appScreen = document.getElementById("app-screen");
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const saveBtn = document.getElementById("save-btn");
    const loadBtn = document.getElementById("load-btn");
    const userDataInput = document.getElementById("user-data-input");
    
    // Elementos del perfil de usuario
    const userNameEl = document.getElementById("user-name");
    const userEmailEl = document.getElementById("user-email");
    const userPhotoEl = document.getElementById("user-photo");
    const syncStatusEl = document.getElementById("sync-status");

    let currentUser = null;

    // Escuchar el estado de la sesión
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        
        // Cargar datos de perfil del usuario en el encabezado
        userNameEl.textContent = user.displayName || "Usuario de Google";
        userEmailEl.textContent = user.email;
        if (user.photoURL) {
          userPhotoEl.src = user.photoURL;
          userPhotoEl.classList.remove("hidden");
        }
        
        // Transición visual elegante entre pantallas
        loginScreen.classList.add("hidden");
        appScreen.classList.remove("hidden");

        setSyncStatus("neutral", "Sesión lista. Listo para cargar o guardar.");
        
        // Cargamos automáticamente el último guardado al iniciar sesión
        cargarProgramaSilencioso();
      } else {
        currentUser = null;
        appScreen.classList.add("hidden");
        loginScreen.classList.remove("hidden");
      }
    });

    // Iniciar sesión con Popup de Google
    loginBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (error) {
        console.error("Error de autenticación:", error);
        alert("Error al iniciar sesión: " + error.message);
      }
    });

    // Cerrar sesión
    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error("Error al cerrar sesión:", error);
      }
    });

    // GUARDAR Datos en Cloud Firestore
    saveBtn.addEventListener("click", async () => {
      if (!currentUser) return;
      
      setSyncStatus("loading", "Guardando cambios en la nube...");
      
      const datosPrograma = {
        contenido: userDataInput.value,
        fechaActualizacion: new Date().toISOString(),
        usuarioEmail: currentUser.email
      };

      try {
        // Guardamos usando el ID único (UID) del usuario para que cada uno tenga su propio archivo privado
        await setDoc(doc(db, "programas", currentUser.uid), datosPrograma);
        setSyncStatus("success", `Guardado exitoso el ${new Date().toLocaleTimeString()}`);
      } catch (error) {
        console.error("Error al guardar en base de datos:", error);
        setSyncStatus("error", "Error al guardar los datos.");
      }
    });

    // CARGAR Datos desde Cloud Firestore
    loadBtn.addEventListener("click", cargarProgramaManual);

    async function cargarProgramaManual() {
      if (!currentUser) return;
      
      setSyncStatus("loading", "Recuperando datos de la nube...");

      try {
        const docRef = doc(db, "programas", currentUser.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          userDataInput.value = docSnap.data().contenido;
          setSyncStatus("success", `Datos recuperados con éxito`);
        } else {
          userDataInput.value = "";
          setSyncStatus("neutral", "No hay programas guardados en esta cuenta.");
        }
      } catch (error) {
        console.error("Error al recuperar datos:", error);
        setSyncStatus("error", "Error al cargar los datos.");
      }
    }

    // Carga silenciosa inicial para no interrumpir con notificaciones intrusivas
    async function cargarProgramaSilencioso() {
      try {
        const docRef = doc(db, "programas", currentUser.uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
          userDataInput.value = docSnap.data().contenido;
        }
      } catch (e) {
        console.warn("Carga silenciosa fallida", e);
      }
    }

    // Helper para actualizar el estado visual de la nube
    function setSyncStatus(tipo, texto) {
      let colorClase = "bg-slate-300";
      if (tipo === "loading") colorClase = "bg-amber-400 animate-pulse";
      if (tipo === "success") colorClase = "bg-emerald-500";
      if (tipo === "error") colorClase = "bg-rose-500";

      syncStatusEl.innerHTML = `
        <span class="w-2.5 h-2.5 rounded-full ${colorClase}"></span>
        ${texto}
      `;
    }

    // Inicializar iconos de Lucide
    lucide.createIcons();
  </script>
</body>
</html>
